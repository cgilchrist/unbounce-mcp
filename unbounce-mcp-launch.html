<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unbounce MCP — Prompt your way to live pages.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   Unbounce Design System — Foundations
   Colors + Type tokens. Import in any UI kit / slide / mock.
   ========================================================= */


:root {
  /* ---------- BRAND CORE ---------- */
  --ub-blue:       #214DFF;   /* Unbounce Blue */
  --ub-blue-600:   #1A3ECC;   /* Hover / pressed blue */
  --ub-blue-700:   #13309A;
  --ub-blue-100:   #D3DCFF;   /* Tint surfaces */
  --ub-blue-50:    #EDF1FF;

  --ub-pink:       #FF3370;   /* Bold pink — primary co-color, CTA energy */
  --ub-pink-600:   #E5185A;
  --ub-pink-100:   #FFD6E2;

  --ub-yellow:     #FFD23F;   /* Sunshine accent, highlights */
  --ub-yellow-100: #FFF3C4;

  --ub-green:      #1FC77E;   /* Conversion / success accent */
  --ub-green-100:  #C8F1DE;

  /* ---------- INK / NEUTRALS ---------- */
  --ub-ink:        #303030;   /* Primary type — pulled from logo path fill */
  --ub-ink-2:      #4A4A4A;   /* Secondary text */
  --ub-ink-3:      #6B7280;   /* Tertiary / meta */
  --ub-ink-4:      #9CA3AF;   /* Muted / placeholder */
  --ub-line:       #E5E7EB;   /* Hairline divider */
  --ub-line-2:     #F0F1F3;
  --ub-bg:         #FFFFFF;
  --ub-bg-soft:    #F7F8FA;   /* Section bg */
  --ub-bg-cream:   #FFF9F0;   /* Warm marketing surface */
  --ub-ink-inv:    #FFFFFF;

  /* ---------- SEMANTIC ---------- */
  --color-bg:           var(--ub-bg);
  --color-bg-elevated:  var(--ub-bg);
  --color-bg-subtle:    var(--ub-bg-soft);
  --color-fg-1:         var(--ub-ink);
  --color-fg-2:         var(--ub-ink-2);
  --color-fg-3:         var(--ub-ink-3);
  --color-fg-muted:     var(--ub-ink-4);
  --color-border:       var(--ub-line);
  --color-accent:       var(--ub-blue);
  --color-cta:          var(--ub-pink);
  --color-success:      var(--ub-green);
  --color-warn:         var(--ub-yellow);

  /* ---------- TYPE FAMILIES ----------
     Display: Barlow Semi Condensed (headlines, strong + simple)
     Body:    Source Sans 3 (modern OFL successor to Source Sans Pro)
     Mono:    JetBrains Mono / system fallback                */
  --font-display: "Barlow Semi Condensed", "Barlow", system-ui, sans-serif;
  --font-body:    "Source Sans 3", "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono:    ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;

  /* ---------- TYPE SCALE (display / hero) ---------- */
  --type-hero:     clamp(48px, 6vw, 88px);   /* "Launch faster. Convert more." */
  --type-h1:       clamp(40px, 4.5vw, 64px);
  --type-h2:       clamp(30px, 3vw, 44px);
  --type-h3:       24px;
  --type-h4:       20px;
  --type-eyebrow:  14px;     /* uppercase labels */
  --type-body-lg:  20px;
  --type-body:     17px;
  --type-body-sm:  15px;
  --type-meta:     13px;
  --type-micro:    11px;

  /* line-heights */
  --lh-tight:    1.04;
  --lh-snug:     1.18;
  --lh-normal:   1.5;
  --lh-loose:    1.65;

  /* ---------- SPACING ---------- */
  --sp-1:  4px;  --sp-2:  8px;  --sp-3: 12px;  --sp-4: 16px;
  --sp-5: 20px;  --sp-6: 24px;  --sp-8: 32px;  --sp-10: 40px;
  --sp-12: 48px; --sp-16: 64px; --sp-20: 80px; --sp-24: 96px;

  /* ---------- RADIUS ---------- */
  --r-xs:  4px;
  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  16px;
  --r-xl:  24px;
  --r-pill: 999px;

  /* ---------- ELEVATION (subtle, marketing-soft) ---------- */
  --shadow-1: 0 1px 2px rgba(16, 24, 40, .06), 0 1px 3px rgba(16, 24, 40, .04);
  --shadow-2: 0 4px 12px rgba(16, 24, 40, .08), 0 2px 4px rgba(16, 24, 40, .04);
  --shadow-3: 0 12px 32px rgba(16, 24, 40, .12), 0 4px 8px rgba(16, 24, 40, .05);
  --shadow-cta: none;

  /* ---------- MOTION ---------- */
  --ease-out: cubic-bezier(.2, .7, .2, 1);
  --ease-in-out: cubic-bezier(.4, 0, .2, 1);
  --dur-fast: 120ms;
  --dur:      200ms;
  --dur-slow: 320ms;
}

/* =========================================================
   SEMANTIC ELEMENT STYLES
   ========================================================= */

html, body {
  font-family: var(--font-body);
  color: var(--color-fg-1);
  background: var(--color-bg);
  font-size: var(--type-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4, h5 {
  font-family: var(--font-display);
  color: var(--color-fg-1);
  letter-spacing: -0.01em;
  margin: 0;
  text-wrap: balance;
}
h1 { font-size: var(--type-h1); font-weight: 700; line-height: var(--lh-tight); letter-spacing: -.02em; }
h2 { font-size: var(--type-h2); font-weight: 700; line-height: var(--lh-snug); letter-spacing: -.015em; }
h3 { font-size: var(--type-h3); font-weight: 600; line-height: var(--lh-snug); }
h4 { font-size: var(--type-h4); font-weight: 600; line-height: var(--lh-snug); }

.eyebrow {
  font-family: var(--font-body);
  font-size: var(--type-eyebrow);
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ub-blue);
}

p { margin: 0 0 var(--sp-4); color: var(--color-fg-2); text-wrap: pretty; }
small, .meta { font-size: var(--type-meta); color: var(--color-fg-3); }
code, pre { font-family: var(--font-mono); font-size: 14px; background: var(--ub-bg-soft); padding: 2px 6px; border-radius: var(--r-xs); }
a { color: var(--ub-blue); text-decoration: none; }
a:hover { color: var(--ub-blue-600); text-decoration: underline; }
a.btn, a.btn:hover, a.nav__cta, a.nav__cta:hover,
a.ub-btn, a.ub-btn:hover { text-decoration: none; }
a.btn--primary, a.btn--primary:hover,
a.btn--secondary, a.btn--secondary:hover,
a.nav__cta, a.nav__cta:hover { color: #fff; }
a.btn--ghost { color: var(--ub-ink); }
a.btn--ghost:hover { color: #fff; }

/* ---- Buttons ---- */
.ub-btn {
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 16px;
  line-height: 1;
  padding: 14px 22px;
  border-radius: var(--r-md);
  border: none;
  cursor: pointer;
  transition: transform var(--dur-fast) var(--ease-out),
              background var(--dur) var(--ease-out),
              box-shadow var(--dur) var(--ease-out);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.ub-btn--primary { background: var(--ub-pink); color: #fff; box-shadow: var(--shadow-cta); }
.ub-btn--primary:hover { background: var(--ub-pink-600); }
.ub-btn--primary:active { transform: translateY(1px); }
.ub-btn--secondary { background: var(--ub-blue); color: #fff; }
.ub-btn--secondary:hover { background: var(--ub-blue-600); }
.ub-btn--ghost { background: transparent; color: var(--ub-ink); border: 2px solid var(--ub-ink); }
.ub-btn--ghost:hover { background: var(--ub-ink); color: #fff; }

/* ==========================================================
   Unbounce MCP Launch — page styles
   Built on top of Unbounce design system tokens.
   Tokens live in assets/unbounce-tokens.css
   ========================================================== */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--ub-bg);
  color: var(--ub-ink);
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ========== NAV ========== */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--ub-line);
}
.nav__inner {
  max-width: 1180px; margin: 0 auto;
  padding: 14px 24px;
  display: flex; align-items: center; gap: 32px;
}
.nav__brand { display: flex; align-items: center; margin-right: 16px; }
.nav__brand img { height: 24px; display: block; }
.nav__kind {
  margin-left: 10px; padding: 3px 8px;
  background: var(--ub-blue);
  color: #fff;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em;
  border-radius: var(--r-pill);
  text-transform: uppercase;
  font-family: var(--font-body);
}
.nav__links { display: flex; gap: 24px; flex: 1; font-size: 15px; font-weight: 600; color: var(--ub-ink); }
.nav__links a:hover { color: var(--ub-blue); }
.nav__cta {
  padding: 10px 20px; border-radius: var(--r-pill);
  background: var(--ub-blue); color: #fff;
  font-size: 14px; font-weight: 700;
  box-shadow: none;
  transition: background var(--dur) var(--ease-out), transform var(--dur-fast) var(--ease-out);
}
.nav__cta:hover { background: var(--ub-blue-600); }
.nav__cta:active { transform: translateY(1px); }
@media (max-width: 860px) { .nav__links { display: none; } }

/* ========== COMMON ========== */
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-body);
  font-size: var(--type-eyebrow);
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--ub-blue);
  text-transform: uppercase;
}.eyebrow--plain { color: var(--ub-ink-3); }
.eyebrow--center { display: flex; justify-content: center; margin-bottom: 24px; }
.eyebrow__dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ub-blue);
  box-shadow: 0 0 0 4px var(--ub-blue-100);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 10px;
  padding: 14px 26px;
  border-radius: var(--r-pill);
  font-weight: 700; font-size: 16px;
  line-height: 1;
  font-family: var(--font-body);
  box-shadow: none;
  transition: transform var(--dur-fast) var(--ease-out),
              background var(--dur) var(--ease-out);
}
.btn--primary { background: var(--ub-blue); color: #fff; box-shadow: none; }
.btn--primary:hover { background: var(--ub-blue-600); }
.btn--primary:active { transform: translateY(1px); }
.btn--secondary { background: var(--ub-blue); color: #fff; }
.btn--secondary:hover { background: var(--ub-blue-600); }
.btn--ghost { background: transparent; color: var(--ub-ink); border: 2px solid var(--ub-ink); border-radius: var(--r-pill); }
.btn--ghost:hover { background: var(--ub-ink); color: #fff; }
.btn--full { width: 100%; padding: 15px 22px; }

/* ========== HERO ========== */
.hero {
  position: relative;
  padding: 72px 24px 88px;
  overflow: hidden;
  background: #fff;
}
.hero__inner {
  position: relative;
  max-width: 1180px; margin: 0 auto;
  display: grid; grid-template-columns: 1.05fr 1fr;
  gap: 56px; align-items: center;
}
.hero__h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(48px, 6vw, 76px);
  line-height: 1.02;
  letter-spacing: -0.025em;
  margin: 20px 0 20px;
  color: var(--ub-ink);
  text-wrap: balance;
}
.hero__accent { color: var(--ub-blue); }.hero__sub {
  font-size: 19px;
  line-height: 1.5;
  color: var(--ub-ink-2);
  max-width: 560px;
  margin: 0 0 28px;
  text-wrap: pretty;
}
.hero__features {
  display: flex; flex-wrap: wrap;
  gap: 10px 22px;
  list-style: none; padding: 0;
  margin: 0 0 32px;
  font-size: 15px; font-weight: 600;
  color: var(--ub-ink-2);
}
.hero__features li { display: flex; align-items: center; gap: 8px; }
.hero__features svg { flex-shrink: 0; }
.hero__ctas { display: flex; gap: 18px; align-items: center; margin-bottom: 14px; }
.hero__ctas a.link {
  font-size: 15px; font-weight: 700;
  color: var(--ub-blue);
}
.hero__ctas a.link:hover { color: var(--ub-blue-600); }
.hero__fine { font-size: 13px; color: var(--ub-ink-3); margin-top: 8px; }

/* hero terminal art */
.hero__art {
  position: relative;
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--shadow-3);
  background: var(--ub-ink);
}
.hero__term {
  color: #fff;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
}
.hero__termhead {
  background: rgba(255,255,255,.05);
  padding: 11px 14px;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.hero__termhead span {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,.2);
}
.hero__termhead span:nth-child(1) { background: #FF5F57; }
.hero__termhead span:nth-child(2) { background: var(--ub-yellow); }
.hero__termhead span:nth-child(3) { background: var(--ub-green); }
.hero__termhead em {
  margin-left: auto; font-style: normal;
  color: rgba(255,255,255,.5); font-size: 12px;
}
.hero__termbody { padding: 20px 22px 24px; }
.hero__termprompt { color: var(--ub-blue); margin-right: 8px; }
.hero__termtext em { font-style: normal; color: var(--ub-yellow); }
.hero__termline { margin-top: 12px; display: flex; gap: 10px; align-items: baseline; }
.hero__termtool { color: var(--ub-blue); }
.hero__termdim { color: rgba(255,255,255,.55); }
.hero__termok { color: var(--ub-green); font-weight: 700; }

@media (max-width: 960px) {
  .hero__inner { grid-template-columns: 1fr; gap: 40px; }
}

/* ========== SECTIONS ========== */
.section { padding: 96px 24px; }
.section--alt { background: var(--ub-bg-soft); }
.section--cream { background: var(--ub-blue-50); }
.section--tight { padding: 56px 24px; background: var(--ub-bg-soft); }
.section--cta {
  padding: 96px 24px;
  background: var(--ub-ink);
  color: #fff;
}
.section__inner { max-width: 1180px; margin: 0 auto; }
.section__inner--narrow { max-width: 900px; }

.sec-head { max-width: 720px; margin-bottom: 56px; }
.sec-head__title {
  font-family: var(--font-display);
  font-size: clamp(34px, 4vw, 52px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.08;
  margin: 14px 0 14px;
  color: var(--ub-ink);
  text-wrap: balance;
}
.sec-head__sub {
  color: var(--ub-ink-2);
  font-size: 18px;
  line-height: 1.55;
  max-width: 640px;
  text-wrap: pretty;
  margin: 0;
}

/* ========== DEMO ========== */
.demo-root {
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--shadow-3);
}
.demo-tabs {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  border-bottom: 1px solid var(--ub-line);
  background: var(--ub-bg-soft);
}
.demo-tab {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 18px;
  text-align: left;
  border-right: 1px solid var(--ub-line);
  color: var(--ub-ink-3);
  transition: background var(--dur) var(--ease-out), color var(--dur) var(--ease-out);
  position: relative;
  font-family: var(--font-body);
}
.demo-tab:last-child { border-right: none; }
.demo-tab:hover { background: #fff; color: var(--ub-ink); }
.demo-tab.is-active { background: #fff; color: var(--ub-ink); }
.demo-tab.is-active::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
  height: 3px; background: var(--ub-blue);
}
.demo-tab__num {
  font-family: var(--font-body); font-weight: 700;
  font-size: 11px;
  color: var(--ub-ink-4);
  letter-spacing: 0.08em;
}
.demo-tab.is-active .demo-tab__num { color: var(--ub-blue); }
.demo-tab__label { display: flex; flex-direction: column; min-width: 0; }
.demo-tab__cat {
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--ub-ink-4);
  text-transform: uppercase;
}
.demo-tab.is-active .demo-tab__cat { color: var(--ub-blue); }
.demo-tab__title {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 2px;
}
@media (max-width: 1000px) {
  .demo-tabs { grid-template-columns: repeat(3, 1fr); }
  .demo-tab:nth-child(3) { border-right: none; }
}

.demo-progress {
  height: 3px; background: var(--ub-line-2); position: relative;
}
.demo-progress__fill {
  height: 100%; background: var(--ub-blue);
  transition: width .25s ease;
}

.demo-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  min-height: 560px;
}
@media (max-width: 900px) {
  .demo-grid { grid-template-columns: 1fr; }
}

/* chat side */
.demo-chat {
  border-right: 1px solid var(--ub-line);
  display: flex; flex-direction: column;
  background: #fff;
}
.demo-chat__header {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 7px;
  border-bottom: 1px solid var(--ub-line);
  background: var(--ub-bg-soft);
}
.demo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ub-ink-4); }
.demo-dot--r { background: #FF5F57; }
.demo-dot--y { background: var(--ub-yellow); }
.demo-dot--g { background: var(--ub-green); }
.demo-chat__title {
  margin-left: 12px; font-family: var(--font-mono);
  font-size: 12px; color: var(--ub-ink-3);
}
.demo-chat__body {
  flex: 1;
  padding: 24px;
  display: flex; flex-direction: column; gap: 20px;
  overflow-y: auto;
  max-height: 500px;
}
.demo-msg { display: flex; flex-direction: column; gap: 8px; animation: fadeUp .3s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.demo-msg__role {
  font-family: var(--font-body); font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ub-ink-4);
}
.demo-msg--user .demo-msg__bubble {
  background: var(--ub-blue);
  color: #fff;
  padding: 14px 18px;
  border-radius: 14px 14px 4px 14px;
  font-size: 15px;
  line-height: 1.5;
}
.demo-caret {
  display: inline-block;
  color: var(--ub-yellow);
  animation: blink 1s steps(2) infinite;
  margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

.demo-msg__stream {
  background: var(--ub-bg-soft);
  border: 1px solid var(--ub-line);
  border-radius: 14px 14px 14px 4px;
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
  font-size: 14px;
}

.step { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp .25s ease both; }
.step--think .step__bar {
  width: 3px;
  background: var(--ub-blue);
  border-radius: 2px;
  align-self: stretch;
}
.step--think .step__text {
  color: var(--ub-ink-2);
  font-style: italic;
  padding: 2px 0;
}
.step__icon {
  width: 20px; height: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.step__icon .check {
  color: var(--ub-green);
  font-size: 14px;
  font-weight: 700;
}
.spinner {
  width: 12px; height: 12px;
  border: 2px solid var(--ub-line);
  border-top-color: var(--ub-blue);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.step__main { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
.step__name {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ub-blue-700);
  background: var(--ub-blue-50);
  padding: 2px 7px;
  border-radius: var(--r-xs);
  align-self: flex-start;
  font-weight: 500;
}
.step__args {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ub-ink-3);
  line-height: 1.45;
}

.demo-done {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  margin-top: 4px;
  background: var(--ub-green-100);
  border-radius: var(--r-md);
  font-size: 14px;
  color: var(--ub-ink);
  font-weight: 700;
  animation: fadeUp .3s ease both;
}
.demo-done__check {
  color: var(--ub-green); font-weight: 700;
}

.demo-chat__foot {
  padding: 12px 16px;
  border-top: 1px solid var(--ub-line);
  background: var(--ub-bg-soft);
}
.demo-input {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-md);
  font-size: 13px;
  color: var(--ub-ink-4);
}
.demo-input__placeholder { flex: 1; }
.demo-input kbd {
  font-family: var(--font-mono); font-size: 10px;
  padding: 2px 5px;
  background: var(--ub-bg-soft);
  border: 1px solid var(--ub-line);
  border-radius: var(--r-xs);
  color: var(--ub-ink-3);
}

/* preview side */
.demo-preview {
  display: flex; flex-direction: column;
  background: linear-gradient(180deg, var(--ub-bg-soft), #fff);
}
.demo-preview__header {
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--ub-line);
  background: var(--ub-bg-soft);
}
.demo-preview__url {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--ub-ink-2);
  padding: 6px 12px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-pill);
}
.demo-preview__lock { color: var(--ub-green); font-size: 9px; }
.demo-preview__path { color: var(--ub-ink-4); }
.demo-preview__badge {
  font-family: var(--font-body); font-weight: 700; font-size: 10px;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  background: var(--ub-blue);
  color: #fff;
  border-radius: var(--r-pill);
}
.demo-preview__body {
  flex: 1;
  padding: 24px;
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* AB preview */
.ab-preview { display: flex; flex-direction: column; gap: 16px; height: 100%; }
.ab-preview__row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; flex: 1; }
.ab-preview__pane {
  opacity: 0; transform: translateY(8px);
  transition: opacity .4s var(--ease-out), transform .4s var(--ease-out);
  display: flex; flex-direction: column; gap: 8px;
}
.ab-preview__pane.is-in { opacity: 1; transform: none; }
.ab-preview__tag {
  font-family: var(--font-body); font-weight: 700; font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ub-ink-3);
  text-transform: uppercase;
}
.ab-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-md);
  font-family: var(--font-mono); font-size: 11px;
  color: var(--ub-ink-3);
  opacity: 0; transform: translateY(8px);
  transition: opacity .4s var(--ease-out), transform .4s var(--ease-out);
}
.ab-bar.is-in { opacity: 1; transform: none; }
.ab-bar__track {
  flex: 1; height: 6px; border-radius: var(--r-xs);
  background: var(--ub-line);
  display: flex; overflow: hidden;
}
.ab-bar__a { flex: 1; background: var(--ub-blue); }
.ab-bar__b { flex: 1; background: var(--ub-ink); }

/* MiniPage */
.mini {
  flex: 1;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-md);
  padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 0;
  overflow: hidden;
}
.mini__nav { display: flex; align-items: center; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid var(--ub-line-2); }
.mini__logo { width: 40px; height: 10px; background: var(--ub-ink); border-radius: 3px; }
.mini__menu { width: 24px; height: 6px; background: var(--ub-ink-4); border-radius: 3px; margin-left: 4px; }
.mini[style*="warm"] .mini__hero { background: var(--ub-bg-cream); }
.mini[style*="cool"] .mini__hero { background: var(--ub-blue-50); }
.mini__hero {
  padding: 16px 12px 18px;
  border-radius: var(--r-sm);
  display: flex; flex-direction: column; gap: 8px;
}
.mini__eyebrow {
  font-family: var(--font-body); font-weight: 700;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ub-blue);
  text-transform: uppercase;
}
.mini__h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 17px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--ub-ink);
}
.mini__sub { font-size: 10px; color: var(--ub-ink-3); }
.mini__cta {
  align-self: flex-start;
  padding: 6px 14px;
  background: var(--ub-blue);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  border-radius: var(--r-pill);
}
.mini__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.mini__cell {
  aspect-ratio: 1.3;
  background: repeating-linear-gradient(45deg, var(--ub-bg-soft), var(--ub-bg-soft) 4px, var(--ub-line) 4px, var(--ub-line) 5px);
  border-radius: var(--r-xs);
}

/* Smart traffic list */
.stf { display: flex; flex-direction: column; gap: 8px; height: 100%; }
.stf__title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.015em;
}
.stf__sub { font-size: 13px; color: var(--ub-ink-3); margin-bottom: 8px; }
.stf__list { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.stf__row {
  display: grid; grid-template-columns: 1.2fr 1.3fr auto;
  align-items: center; gap: 12px;
  padding: 12px 14px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-md);
  opacity: 0; transform: translateY(6px);
  transition: opacity .4s var(--ease-out), transform .4s var(--ease-out);
}
.stf__row.is-in { opacity: 1; transform: none; }
.stf__slug { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 13px; }
.stf__on {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ub-green);
  box-shadow: 0 0 0 4px var(--ub-green-100);
  animation: pulse 2s infinite;
}
.stf__meta { display: flex; gap: 10px; font-family: var(--font-mono); font-size: 11px; color: var(--ub-ink-3); }
.stf__lift {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 800;
  color: var(--ub-green);
  letter-spacing: -0.015em;
}
.stf__foot {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px dashed var(--ub-line);
  display: flex; justify-content: space-between; align-items: baseline;
}
.stf__total {
  font-family: var(--font-body); font-weight: 700; font-size: 11px;
  color: var(--ub-ink-3); letter-spacing: 0.1em;
  text-transform: uppercase;
}
.stf__totalnum {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 800;
  color: var(--ub-blue);
  letter-spacing: -0.02em;
}

/* DTR preview */
.dtr { display: flex; flex-direction: column; gap: 10px; height: 100%; }
.dtr__browser-url {
  font-family: var(--font-mono); font-size: 11px;
  padding: 6px 10px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-sm);
  color: var(--ub-ink-3);
}
.dtr__qs { color: var(--ub-blue); font-weight: 500; }
.dtr__page {
  flex: 1;
  padding: 24px 20px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-md);
  display: flex; flex-direction: column; gap: 12px;
}
.dtr__h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  letter-spacing: -0.02em;
  line-height: 1.12;
  color: var(--ub-ink);
}
.dtr__city {
  display: inline-block;
  color: var(--ub-blue);
  background: var(--ub-blue-100);
  padding: 0 8px;
  border-radius: var(--r-xs);
  transition: opacity .3s ease, transform .3s ease;
}
.dtr__city.is-in { animation: cityIn .5s var(--ease-out); }
@keyframes cityIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.dtr__sub { font-size: 14px; color: var(--ub-ink-3); }
.dtr__cta {
  align-self: flex-start;
  padding: 11px 22px;
  background: var(--ub-ink); color: #fff;
  font-size: 14px; font-weight: 700;
  border-radius: var(--r-pill);
  transition: all .3s var(--ease-out);
}
.dtr__cta.is-in {
  background: var(--ub-blue);
  box-shadow: none;
  animation: ctaPulse .5s var(--ease-out);
}
@keyframes ctaPulse { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
.dtr__form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; }
.dtr__field { height: 32px; background: var(--ub-bg-soft); border-radius: var(--r-xs); border: 1px solid var(--ub-line-2); }
.dtr__chips { display: flex; gap: 8px; }
.dtr__chip {
  font-family: var(--font-mono); font-size: 10px;
  padding: 4px 10px;
  background: var(--ub-bg-soft);
  border: 1px solid var(--ub-line);
  border-radius: var(--r-pill);
  color: var(--ub-ink-3);
  opacity: 0.35;
  transition: all .3s var(--ease-out);
}
.dtr__chip.is-in {
  opacity: 1; background: var(--ub-blue-100); border-color: var(--ub-blue);
  color: var(--ub-blue-700);
  font-weight: 500;
}

/* ABC preview */
.abc { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; height: 100%; }
.abc__pane {
  display: flex; flex-direction: column; gap: 6px;
  opacity: 0; transform: translateY(10px);
  transition: opacity .4s var(--ease-out), transform .4s var(--ease-out);
}
.abc__pane.is-in { opacity: 1; transform: none; }
.abc__tag {
  font-family: var(--font-body); font-weight: 700;
  font-size: 9px; letter-spacing: 0.1em;
  color: var(--ub-ink-3);
  text-transform: uppercase;
}
.abc__mini {
  flex: 1;
  padding: 12px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-top: 3px solid var(--accent);
  border-radius: var(--r-sm);
  display: flex; flex-direction: column; gap: 8px;
}
.abc__h1 {
  font-family: var(--font-display);
  font-size: 14px; font-weight: 700;
  letter-spacing: -0.015em;
  line-height: 1.12;
  color: var(--ub-ink);
}
.abc__sub { font-size: 10px; color: var(--ub-ink-3); }
.abc__cta {
  align-self: flex-start;
  padding: 4px 12px;
  background: var(--ub-blue);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  border-radius: var(--r-pill);
}
.abc__img {
  flex: 1;
  margin-top: auto;
  background: repeating-linear-gradient(45deg, var(--ub-bg-soft), var(--ub-bg-soft) 4px, var(--ub-line) 4px, var(--ub-line) 5px);
  border-radius: var(--r-xs);
  min-height: 60px;
}

/* Report view */
.rep { display: flex; flex-direction: column; gap: 14px; height: 100%; }
.rep__head { display: flex; justify-content: space-between; align-items: flex-start; }
.rep__title { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.015em; }
.rep__sub { font-family: var(--font-mono); font-size: 11px; color: var(--ub-ink-3); margin-top: 4px; }
.rep__stat { text-align: right; }
.rep__statnum { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--ub-green); letter-spacing: -0.02em; line-height: 1; }
.rep__statlbl { font-family: var(--font-body); font-weight: 700; font-size: 10px; color: var(--ub-ink-3); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 4px; }
.rep__chart {
  display: flex; align-items: flex-end; gap: 6px;
  height: 80px;
  padding: 10px 12px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-sm);
}
.rep__bar {
  flex: 1;
  background: linear-gradient(180deg, var(--ub-blue), var(--ub-blue-600));
  border-radius: 3px 3px 0 0;
  animation: growBar .6s var(--ease-out) both;
  transform-origin: bottom;
}
@keyframes growBar { from { transform: scaleY(0); } to { transform: scaleY(1); } }
.rep__table {
  display: flex; flex-direction: column; gap: 1px;
  background: var(--ub-line); border-radius: var(--r-sm); overflow: hidden;
  border: 1px solid var(--ub-line);
}
.rep__thead, .rep__trow {
  display: grid; grid-template-columns: 1.5fr 1fr 0.7fr 1.2fr;
  gap: 12px;
  padding: 8px 12px;
  background: #fff;
  font-size: 13px;
}
.rep__thead {
  font-family: var(--font-body); font-weight: 700; font-size: 10px;
  color: var(--ub-ink-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--ub-bg-soft);
}
.rep__trow { animation: fadeUp .4s var(--ease-out) both; }
.rep__slug { font-family: var(--font-mono); }
.rep__pos { color: var(--ub-green); font-weight: 700; }
.rep__neg { color: var(--ub-pink-600); font-weight: 700; }
.rep__reco {
  margin-top: auto;
  padding: 12px 16px;
  background: var(--ub-blue-50);
  border-radius: var(--r-sm);
  font-size: 13px;
  line-height: 1.5;
  color: var(--ub-ink);
}
.rep__recolbl {
  display: inline-block;
  font-family: var(--font-body); font-weight: 800;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ub-blue);
  margin-right: 8px;
  text-transform: uppercase;
}

/* ========== HOW IT WORKS ========== */
.how {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
@media (max-width: 900px) { .how { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .how { grid-template-columns: 1fr; } }
.how__card {
  padding: 32px 28px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-lg);
  transition: transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
}
.how__card:hover { transform: translateY(-2px); box-shadow: var(--shadow-3); }
.how__n {
  font-family: var(--font-display);
  font-size: 40px; font-weight: 800;
  color: var(--ub-blue);
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 20px;
}
.how__title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.015em;
  margin-bottom: 10px;
  line-height: 1.15;
  color: var(--ub-ink);
}
.how__body {
  font-size: 15px;
  color: var(--ub-ink-2);
  line-height: 1.55;
}

/* ========== FEATURES ========== */
.features {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
@media (max-width: 900px) { .features { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .features { grid-template-columns: 1fr; } }
.features__card {
  padding: 32px 28px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-lg);
  transition: transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
}
.features__card:hover { transform: translateY(-2px); box-shadow: var(--shadow-3); }
.features__tag {
  display: inline-block;
  font-family: var(--font-body); font-weight: 800;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--ub-blue);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.features__title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.015em;
  margin-bottom: 10px;
  color: var(--ub-ink);
}
.features__body {
  font-size: 15px;
  color: var(--ub-ink-2);
  line-height: 1.55;
}

/* ========== CLIENTS ========== */
.clients {
  display: flex; flex-wrap: wrap;
  justify-content: center;
  gap: 32px 56px;
}
.clients__item {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--ub-ink-3);
  transition: color var(--dur) var(--ease-out);
}
.clients__item:hover { color: var(--ub-blue); }

/* ========== INSTALL ========== */
.install {
  display: grid; grid-template-columns: 1fr 1.4fr 1fr;
  gap: 24px;
  align-items: start;
}
@media (max-width: 900px) { .install { grid-template-columns: 1fr; } }
.install__step {
  padding: 28px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-lg);
}
.install__n {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 800;
  color: var(--ub-blue);
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 18px;
}
.install__title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.015em;
  margin-bottom: 10px;
}
.install__body { font-size: 15px; color: var(--ub-ink-2); line-height: 1.55; }
.install__code {
  margin: 0;
  padding: 16px;
  background: var(--ub-ink);
  color: rgba(255,255,255,.9);
  border-radius: var(--r-md);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.55;
  overflow-x: auto;
}
.install__code code {
  background: transparent;
  padding: 0;
  color: inherit;
  border-radius: 0;
  font-size: inherit;
}

/* ========== FAQ ========== */
.faq { display: flex; flex-direction: column; border-top: 1px solid var(--ub-line); }
.faq__item { border-bottom: 1px solid var(--ub-line); }
.faq__q {
  width: 100%;
  padding: 24px 0;
  display: flex; justify-content: space-between; align-items: center;
  text-align: left;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ub-ink);
}
.faq__toggle {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 600;
  color: var(--ub-blue);
  margin-left: 16px;
}
.faq__a {
  max-height: 0;
  overflow: hidden;
  color: var(--ub-ink-2);
  font-size: 16px;
  line-height: 1.6;
  transition: max-height .3s ease, padding .3s ease;
}
.faq__item.is-open .faq__a {
  max-height: 300px;
  padding-bottom: 24px;
}

/* ========== LEAD GEN ========== */
.section--cta .eyebrow--plain { color: var(--ub-yellow); }
.leadgen {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: start;
}
@media (max-width: 860px) { .leadgen { grid-template-columns: 1fr; gap: 40px; } }
.leadgen__title {
  font-family: var(--font-display);
  font-size: clamp(32px, 3.6vw, 48px);
  font-weight: 800;
  letter-spacing: -0.025em;
  line-height: 1.06;
  margin: 16px 0 16px;
  color: #fff;
  text-wrap: balance;
}
.leadgen__sub {
  color: rgba(255,255,255,.75);
  font-size: 17px; line-height: 1.55;
  margin-bottom: 28px;
}
.leadgen__list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
.leadgen__list li {
  display: flex; align-items: center; gap: 12px;
  font-size: 15px;
  color: rgba(255,255,255,.92);
}
.leadgen__check {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--ub-blue); color: #fff;
  font-size: 12px; font-weight: 800;
  flex-shrink: 0;
}

.leadgen__form {
  background: #fff;
  padding: 32px;
  border-radius: var(--r-lg);
  display: flex; flex-direction: column; gap: 18px;
  box-shadow: var(--shadow-3);
}
.field { display: flex; flex-direction: column; gap: 6px; }
.field > span {
  font-family: var(--font-body); font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--ub-ink-2);
  text-transform: uppercase;
}
.field input, .field select {
  padding: 12px 14px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 15px;
  color: var(--ub-ink);
  transition: border-color var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
}
.field input:focus, .field select:focus {
  outline: none;
  border-color: var(--ub-blue);
  box-shadow: 0 0 0 3px rgba(0,153,255,.2);
}
.field input::placeholder { color: var(--ub-ink-4); }
.field__fine {
  font-size: 12px; color: var(--ub-ink-3); text-align: center;
  margin-top: -4px;
}

.leadgen__done {
  background: #fff;
  padding: 48px 32px;
  border-radius: var(--r-lg);
  text-align: center;
  box-shadow: var(--shadow-3);
}
.leadgen__donecheck {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--ub-green);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 800;
  margin: 0 auto 20px;
}
.leadgen__donetitle {
  font-family: var(--font-display);
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
  color: var(--ub-ink);
}
.leadgen__donesub { color: var(--ub-ink-2); font-size: 15px; line-height: 1.5; }

/* ========== FOOTER ========== */
.footer {
  background: var(--ub-ink);
  color: #fff;
  padding: 72px 24px 32px;
}
.footer__inner {
  max-width: 1180px; margin: 0 auto;
  display: grid;
  grid-template-columns: 1.2fr repeat(3, 1fr);
  gap: 40px;
}
@media (max-width: 860px) { .footer__inner { grid-template-columns: 1fr 1fr; } }
@media (max-width: 500px) { .footer__inner { grid-template-columns: 1fr; } }
.footer__brand img { height: 28px; filter: invert(1) brightness(2); display: block; margin-bottom: 14px; }
.footer__brand p { color: rgba(255,255,255,.65); font-size: 14px; line-height: 1.55; max-width: 240px; margin: 0; }
.footer__h {
  font-family: var(--font-body); font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.12em;
  color: var(--ub-yellow);
  margin-bottom: 14px;
  text-transform: uppercase;
}
.footer__col a {
  display: block;
  padding: 5px 0;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,.85);
}
.footer__col a:hover { color: #fff; }
.footer__fine {
  grid-column: 1 / -1;
  padding-top: 24px;
  margin-top: 8px;
  border-top: 1px solid rgba(255,255,255,.12);
  font-size: 13px;
  color: rgba(255,255,255,.6);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}

/* ========== TWEAKS PANEL ========== */
.tweaks {
  position: fixed; bottom: 24px; right: 24px;
  width: 280px;
  background: #fff;
  border: 1px solid var(--ub-line);
  border-radius: var(--r-lg);
  padding: 16px;
  box-shadow: var(--shadow-3);
  z-index: 100;
  display: none;
  font-size: 13px;
}
.tweaks.is-on { display: block; }
.tweaks__title {
  font-family: var(--font-display); font-weight: 700;
  font-size: 16px;
  margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.tweaks__title em {
  font-style: normal;
  font-family: var(--font-body); font-weight: 700;
  font-size: 10px;
  color: var(--ub-ink-3);
  letter-spacing: 0.1em;
}
.tweaks__row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-top: 1px solid var(--ub-line-2);
  gap: 12px;
}
.tweaks__label { font-size: 13px; color: var(--ub-ink-2); font-weight: 600; }
.tweaks__seg {
  display: flex; background: var(--ub-bg-soft);
  border-radius: var(--r-sm); padding: 2px;
}
.tweaks__seg button {
  padding: 5px 10px; border-radius: var(--r-xs);
  font-size: 12px; font-weight: 600;
  color: var(--ub-ink-3);
  font-family: var(--font-body);
}
.tweaks__seg button.is-on { background: #fff; color: var(--ub-blue); box-shadow: var(--shadow-1); }
</style>
</head>

<script type="text/babel">
// Interactive prompt demo — cycles through 5 marketer scenarios
// Each scenario has: the prompt, a scripted "agent run" sequence (tool calls),
// and a final rendered result panel on the right.

const SCENARIOS = [
  {
    id: 'launch-ab',
    title: 'Launch + A/B test',
    category: 'NEW PAGE',
    prompt: `Make me a page for our Spring Hardware Sale launching Friday. Let's A/B test a version with the headline "30% off everything" against one that says "Your workshop, upgraded." Publish both to unbouncepages.com/spring-sale.`,
    steps: [
      { kind: 'think', text: 'Designing two variants with distinct headline strategies…' },
      { kind: 'tool', name: 'write_html', args: 'variant-a.html · "30% off everything"', duration: 900 },
      { kind: 'tool', name: 'write_html', args: 'variant-b.html · "Your workshop, upgraded."', duration: 900 },
      { kind: 'tool', name: 'deploy_page', args: 'account: Acme Retail · slug: /spring-sale', duration: 1200 },
      { kind: 'tool', name: 'set_traffic_mode', args: 'A/B · 50/50 split', duration: 700 },
      { kind: 'tool', name: 'publish_page', args: 'unbouncepages.com/spring-sale', duration: 900 },
      { kind: 'done', text: 'Published. 2 variants live.' },
    ],
    result: { kind: 'ab-preview' },
  },
  {
    id: 'smart-traffic',
    title: 'Turn on Smart Traffic',
    category: 'OPTIMIZE',
    prompt: `Find all my pages with traffic and multiple variants. Turn on Smart Traffic so we get that ~20% conversion boost.`,
    steps: [
      { kind: 'tool', name: 'list_pages', args: 'filter: published, variants > 1', duration: 900 },
      { kind: 'think', text: 'Found 4 pages with live traffic and ≥2 variants.' },
      { kind: 'tool', name: 'set_traffic_mode', args: '/q3-webinar → Smart Traffic', duration: 600 },
      { kind: 'tool', name: 'set_traffic_mode', args: '/free-audit → Smart Traffic', duration: 600 },
      { kind: 'tool', name: 'set_traffic_mode', args: '/demo-request → Smart Traffic', duration: 600 },
      { kind: 'tool', name: 'set_traffic_mode', args: '/pricing-v2 → Smart Traffic', duration: 600 },
      { kind: 'done', text: '4 pages switched. Routing live.' },
    ],
    result: { kind: 'smart-traffic-list' },
  },
  {
    id: 'dtr-edit',
    title: 'Edit with DTR',
    category: 'EDIT LIVE PAGE',
    prompt: `On the /demo-request page, swap the hero CTA copy to "Book a 15-min walkthrough" and add Dynamic Text Replacement so the headline reads the visitor's city when it's in the URL.`,
    steps: [
      { kind: 'tool', name: 'get_variant', args: '/demo-request · variant A', duration: 700 },
      { kind: 'think', text: 'Locating the hero CTA and headline blocks…' },
      { kind: 'tool', name: 'edit_variant', args: 'CTA → "Book a 15-min walkthrough"', duration: 900 },
      { kind: 'tool', name: 'edit_variant', args: 'Headline → {{city|your city}} DTR', duration: 1000 },
      { kind: 'tool', name: 'publish_page', args: '/demo-request', duration: 700 },
      { kind: 'done', text: 'Changes live. DTR active on ?city=.' },
    ],
    result: { kind: 'dtr-preview' },
  },
  {
    id: 'smart-traffic-2',
    title: 'Clone + localize',
    category: 'SCALE',
    prompt: `Take my best-performing demo page and clone it into 3 industry-specific versions: SaaS, Healthcare, and E-commerce. Run them as an A/B/C test at equal weights.`,
    steps: [
      { kind: 'tool', name: 'get_variant', args: '/demo-request · top performer', duration: 700 },
      { kind: 'think', text: 'Rewriting copy for each vertical…' },
      { kind: 'tool', name: 'write_html', args: 'saas.html — SaaS ICP, integrations angle', duration: 900 },
      { kind: 'tool', name: 'write_html', args: 'health.html — HIPAA, compliance proof', duration: 900 },
      { kind: 'tool', name: 'write_html', args: 'ecom.html — GMV lift, 7-day trial', duration: 900 },
      { kind: 'tool', name: 'deploy_page', args: '/demo-industry · 3 variants', duration: 1100 },
      { kind: 'tool', name: 'set_variant_weights', args: '34 / 33 / 33', duration: 600 },
      { kind: 'done', text: '3 localized variants published.' },
    ],
    result: { kind: 'abc-preview' },
  },
  {
    id: 'friday-push',
    title: 'Weekly performance report',
    category: 'ANALYZE',
    prompt: `What happened across my landing pages this week? Which variants are winning, and where should I double down?`,
    steps: [
      { kind: 'tool', name: 'list_pages', args: 'window: last 7 days', duration: 800 },
      { kind: 'tool', name: 'fetch_metrics', args: '12 pages · conversion, CVR, visits', duration: 1100 },
      { kind: 'think', text: 'Analyzing variant deltas and statistical significance…' },
      { kind: 'done', text: 'Report ready.' },
    ],
    result: { kind: 'report' },
  },
];

function PromptDemo() {
  const [activeIdx, setActiveIdx] = React.useState(0);
  const [runState, setRunState] = React.useState('idle'); // idle | typing | running | done
  const [typedChars, setTypedChars] = React.useState(0);
  const [stepIdx, setStepIdx] = React.useState(-1);
  const [autoplay, setAutoplay] = React.useState(true);

  const scenario = SCENARIOS[activeIdx];
  const fullPrompt = scenario.prompt;

  // Reset + start sequence when scenario changes
  React.useEffect(() => {
    setRunState('typing');
    setTypedChars(0);
    setStepIdx(-1);
  }, [activeIdx]);

  // Typing effect
  React.useEffect(() => {
    if (runState !== 'typing') return;
    if (typedChars >= fullPrompt.length) {
      const t = setTimeout(() => {
        setRunState('running');
        setStepIdx(0);
      }, 400);
      return () => clearTimeout(t);
    }
    const speed = 14 + Math.random() * 10;
    const t = setTimeout(() => setTypedChars((c) => Math.min(c + 2, fullPrompt.length)), speed);
    return () => clearTimeout(t);
  }, [runState, typedChars, fullPrompt]);

  // Step runner
  React.useEffect(() => {
    if (runState !== 'running') return;
    if (stepIdx >= scenario.steps.length) {
      setRunState('done');
      return;
    }
    const step = scenario.steps[stepIdx];
    const dur = step.duration || 700;
    const t = setTimeout(() => setStepIdx((i) => i + 1), dur);
    return () => clearTimeout(t);
  }, [runState, stepIdx, scenario]);

  // Autoplay — advance to next scenario 3.5s after done
  React.useEffect(() => {
    if (runState !== 'done' || !autoplay) return;
    const t = setTimeout(() => {
      setActiveIdx((i) => (i + 1) % SCENARIOS.length);
    }, 3500);
    return () => clearTimeout(t);
  }, [runState, autoplay]);

  const visibleSteps = scenario.steps.slice(0, Math.max(0, stepIdx + (runState === 'done' ? 0 : 1)));
  const progress = runState === 'done' ? 1 : runState === 'running' ? (stepIdx + 1) / (scenario.steps.length + 1) : typedChars / fullPrompt.length * 0.3;

  return (
    <div className="demo-root">
      {/* Scenario selector tabs */}
      <div className="demo-tabs" role="tablist">
        {SCENARIOS.map((s, i) => (
          <button
            key={s.id}
            role="tab"
            aria-selected={i === activeIdx}
            className={`demo-tab ${i === activeIdx ? 'is-active' : ''}`}
            onClick={() => { setAutoplay(false); setActiveIdx(i); }}
          >
            <span className="demo-tab__num">{String(i + 1).padStart(2, '0')}</span>
            <span className="demo-tab__label">
              <span className="demo-tab__cat">{s.category}</span>
              <span className="demo-tab__title">{s.title}</span>
            </span>
          </button>
        ))}
      </div>

      {/* Progress bar for active scenario */}
      <div className="demo-progress" aria-hidden="true">
        <div className="demo-progress__fill" style={{ width: `${progress * 100}%` }} />
      </div>

      <div className="demo-grid">
        {/* LEFT: chat / agent panel */}
        <div className="demo-chat">
          <div className="demo-chat__header">
            <span className="demo-dot demo-dot--r" />
            <span className="demo-dot demo-dot--y" />
            <span className="demo-dot demo-dot--g" />
            <span className="demo-chat__title">claude · with unbounce-mcp</span>
          </div>

          <div className="demo-chat__body">
            {/* User prompt */}
            <div className="demo-msg demo-msg--user">
              <div className="demo-msg__role">YOU</div>
              <div className="demo-msg__bubble">
                {fullPrompt.slice(0, typedChars)}
                {runState === 'typing' && <span className="demo-caret">▋</span>}
              </div>
            </div>

            {/* Agent response */}
            {runState !== 'typing' && (
              <div className="demo-msg demo-msg--agent">
                <div className="demo-msg__role">CLAUDE</div>
                <div className="demo-msg__stream">
                  {visibleSteps.map((step, i) => (
                    <StepRow key={i} step={step} isLast={i === visibleSteps.length - 1 && runState !== 'done'} />
                  ))}
                  {runState === 'done' && (
                    <div className="demo-done">
                      <span className="demo-done__check">✓</span>
                      <span>{scenario.steps.find(s => s.kind === 'done')?.text || 'Done.'}</span>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>

          <div className="demo-chat__foot">
            <div className="demo-input">
              <span className="demo-input__placeholder">Ask your agent to publish, edit, or optimize…</span>
              <kbd>⌘</kbd><kbd>↵</kbd>
            </div>
          </div>
        </div>

        {/* RIGHT: result preview */}
        <div className="demo-preview">
          <div className="demo-preview__header">
            <div className="demo-preview__url">
              <span className="demo-preview__lock">●</span>
              <span>your.domain.com</span>
              <span className="demo-preview__path">/landing-page</span>
            </div>
            <span className="demo-preview__badge">LIVE</span>
          </div>
          <div className="demo-preview__body">
            <ResultView scenario={scenario} runState={runState} stepIdx={stepIdx} />
          </div>
        </div>
      </div>
    </div>
  );
}

function StepRow({ step, isLast }) {
  if (step.kind === 'think') {
    return (
      <div className="step step--think">
        <span className="step__bar" />
        <span className="step__text">{step.text}</span>
      </div>
    );
  }
  if (step.kind === 'tool') {
    return (
      <div className={`step step--tool ${isLast ? 'is-running' : ''}`}>
        <span className="step__icon">
          {isLast ? <span className="spinner" /> : <span className="check">✓</span>}
        </span>
        <div className="step__main">
          <code className="step__name">{step.name}</code>
          <span className="step__args">{step.args}</span>
        </div>
      </div>
    );
  }
  return null;
}

// ============ RESULT VIEWS ============

function ResultView({ scenario, runState, stepIdx }) {
  const revealed = runState === 'done' || runState === 'running';
  const revealIdx = runState === 'done' ? 99 : stepIdx;
  const kind = scenario.result.kind;

  if (kind === 'ab-preview') return <ABPreview revealed={revealed} revealIdx={revealIdx} />;
